name: Build & Push images

# Multi-arch container builds (linux/amd64 + linux/arm64) pushed to GHCR.
#
# Triggers:
#   - push to main → tags: latest, sha-<7>
#   - push of a v*.*.* tag → adds: v<semver>, <semver>, <major.minor>, <major>
#   - workflow_dispatch → manual run
#
# Image names (public, no pull secret needed in Azure):
#   ghcr.io/${{ github.repository_owner }}/ces-api
#   ghcr.io/${{ github.repository_owner }}/ces-web

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra image tag (optional, e.g. hotfix-1)'
        required: false
        default: ''

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # Required so GITHUB_TOKEN can push to ghcr.io/<owner>/*
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/ces-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/ces-web

jobs:
  build-api:
    name: Build & push API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=CES Internal API
            org.opencontainers.image.description=CES Tech internal operations platform — NestJS API
            org.opencontainers.image.vendor=N-Expert Solutions Pvt. Ltd.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          provenance: false

  build-web:
    name: Build & push Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=CES Internal Web
            org.opencontainers.image.description=CES Tech internal operations platform — Next.js web app
            org.opencontainers.image.vendor=N-Expert Solutions Pvt. Ltd.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* values are baked into the client bundle at build time.
          # They point at the production API URL — change these in step with
          # the actual Container App fqdn once Batch 3 provisions it. Until
          # then, the placeholders below produce a usable image where the web
          # talks to the api via the same Container Apps Environment.
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL || 'https://api.ops.ces-pl.com' }}
            NEXT_PUBLIC_AZURE_TENANT_ID=${{ vars.NEXT_PUBLIC_AZURE_TENANT_ID || '00000000-0000-0000-0000-000000000000' }}
            NEXT_PUBLIC_AZURE_WEB_CLIENT_ID=${{ vars.NEXT_PUBLIC_AZURE_WEB_CLIENT_ID || '00000000-0000-0000-0000-000000000000' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          provenance: false

  summary:
    name: Pull commands
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - name: Surface pull commands
        run: |
          {
            echo "## Images published"
            echo ""
            echo "**API**: \`${API_IMAGE}\`"
            echo "**Web**: \`${WEB_IMAGE}\`"
            echo ""
            echo "Pull the SHA-pinned build:"
            echo ""
            echo '```sh'
            echo "docker pull ${API_IMAGE}:sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
            echo "docker pull ${WEB_IMAGE}:sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
